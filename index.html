<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Game Pro</title>
<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#0f0f0f;
  color:white;
}
header {
  padding:20px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}
.card {
  background:#1c1c1e;
  margin:12px;
  padding:16px;
  border-radius:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
input, select, button {
  padding:10px;
  border-radius:10px;
  border:none;
  margin:5px;
}
button {
  background:#0a84ff;
  color:white;
}
.quest {
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}
.progress {
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}
.bar {
  height:100%;
  background:#30d158;
}
.locked {
  opacity:0.4;
}
img.goal {
  width:100%;
  border-radius:15px;
  margin-top:10px;
}
</style>
</head>
<body>

<header>🎮 Life Game Pro</header>

<div class="card">
  <h3>👤 Player</h3>
  <div id="stats"></div>
  <div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
  <h3>📜 Quests</h3>
  <input id="questInput" placeholder="Nieuwe taak...">
  <button onclick="addQuest()">Add</button>
  <div id="questList"></div>
</div>

<div class="card">
  <h3>🎯 Goals</h3>
  <input id="goalInput" placeholder="Nieuw doel...">
  <input id="goalImg" placeholder="Image URL (optioneel)">
  <button onclick="addGoal()">Add</button>
  <div id="goalList"></div>
</div>

<div id="unlockSection" class="card locked">
  <h3>🔓 Unlockables (Level 5)</h3>
  <p>Nieuwe features komen vrij!</p>
</div>

<script>
let xp = parseInt(localStorage.getItem('xp')) || 0;
let coins = parseInt(localStorage.getItem('coins')) || 0;
let quests = JSON.parse(localStorage.getItem('quests')) || [];
let goals = JSON.parse(localStorage.getItem('goals')) || [];

function level(){ return Math.floor(xp/100)+1 }

function save(){
  localStorage.setItem('xp',xp);
  localStorage.setItem('coins',coins);
  localStorage.setItem('quests',JSON.stringify(quests));
  localStorage.setItem('goals',JSON.stringify(goals));
}

function updateStats(){
  document.getElementById('stats').innerText = `Level ${level()} • XP ${xp} • Coins ${coins}`;
  document.getElementById('xpBar').style.width = (xp%100)+"%";

  if(level()>=5){
    document.getElementById('unlockSection').classList.remove('locked');
  }
}

function addQuest(){
  const text = document.getElementById('questInput').value;
  if(!text) return;

  const difficulty = Math.floor(Math.random()*40)+10; // dynamic difficulty
  quests.push({text, difficulty});
  document.getElementById('questInput').value="";
  save(); render();
}

function completeQuest(i){
  xp += quests[i].difficulty;
  coins += Math.floor(quests[i].difficulty/2);
  quests.splice(i,1);
  save(); render();
}

function addGoal(){
  const text = document.getElementById('goalInput').value;
  const img = document.getElementById('goalImg').value;
  if(!text) return;

  goals.push({text,img});
  document.getElementById('goalInput').value="";
  document.getElementById('goalImg').value="";
  save(); render();
}

function render(){
  updateStats();

  const ql = document.getElementById('questList');
  ql.innerHTML="";
  quests.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='quest';
    div.innerHTML=`${q.text} (+${q.difficulty} XP) <button onclick="completeQuest(${i})">✔</button>`;
    ql.appendChild(div);
  });

  const gl = document.getElementById('goalList');
  gl.innerHTML="";
  goals.forEach(g=>{
    const div=document.createElement('div');
    div.innerHTML=`<strong>${g.text}</strong>`;
    if(g.img){
      const img=document.createElement('img');
      img.src=g.img;
      img.className='goal';
      div.appendChild(img);
    }
    gl.appendChild(div);
  });
}

render();
</script>

</body>
</html>
