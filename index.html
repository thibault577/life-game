<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Game AI Ultimate</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
}
header {
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:bold;
  text-shadow: 0 3px 6px rgba(0,0,0,0.4);
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  margin:15px;
  padding:22px;
  border-radius:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  transition: transform 0.3s;
}
.card:hover {
  transform: translateY(-4px);
}
input, button {
  padding:12px;
  border-radius:12px;
  border:none;
  margin:5px;
  font-size:16px;
}
button {
  background:#ff9500;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition: background 0.2s;
}
button:hover {
  background:#ffb84d;
}
.quest {
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  padding:10px;
  border-radius:15px;
  background: rgba(255,255,255,0.12);
}
.progress {
  height:16px;
  background:#333;
  border-radius:12px;
  overflow:hidden;
  margin-top:12px;
}
.bar {
  height:100%;
  background: #30d158;
  transition: width 0.5s;
}
img.goal {
  width:100%;
  border-radius:20px;
  margin-top:12px;
  opacity:0;
}
.locked {
  opacity:0.5;
  transition: opacity 1s;
}
.levelUp {
  animation: pop 0.5s ease-out;
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
</style>
</head>
<body>
<header>🎮 Life Game AI Ultimate</header>

<div class="card">
  <h3>👤 Player</h3>
  <div id="stats"></div>
  <div class="progress"><div id="xpBar" class="bar"></div></div>
</div>

<div class="card">
  <h3>📜 Quests</h3>
  <input id="questInput" placeholder="Nieuwe taak...">
  <button onclick="addQuest()">Add</button>
  <div id="questList"></div>
</div>

<div class="card">
  <h3>🎯 Goals</h3>
  <input id="goalInput" placeholder="Nieuw doel...">
  <button onclick="addGoal()">Add</button>
  <div id="goalList"></div>
</div>

<div id="unlockSection" class="card locked">
  <h3>🔓 Unlockables (Level 5)</h3>
  <p>Nieuwe features komen vrij!</p>
</div>

<script>
// ==== Data storage ==== 
let xp = parseInt(localStorage.getItem('xp')) || 0;
let coins = parseInt(localStorage.getItem('coins')) || 0;
let quests = JSON.parse(localStorage.getItem('quests')) || [];
let goals = JSON.parse(localStorage.getItem('goals')) || [];

// ==== Helper functions ====
function level(){ return Math.floor(xp/100)+1; }
function save(){
  localStorage.setItem('xp', xp);
  localStorage.setItem('coins', coins);
  localStorage.setItem('quests', JSON.stringify(quests));
  localStorage.setItem('goals', JSON.stringify(goals));
}

// ==== Animations ====
function animateXP(){
  gsap.fromTo('#xpBar', {width:'0%'}, {width:(xp%100)+'%', duration:0.8});
}

function updateStats(){
  const statsDiv = document.getElementById('stats');
  const oldLevel = parseInt(statsDiv.getAttribute('data-level')) || 0;
  statsDiv.innerText = `Level ${level()} • XP ${xp} • Coins ${coins}`;
  statsDiv.setAttribute('data-level', level());
  animateXP();
  if(level() > oldLevel){
    statsDiv.classList.add('levelUp');
    setTimeout(()=>statsDiv.classList.remove('levelUp'),500);
  }
  if(level() >= 5){
    document.getElementById('unlockSection').classList.remove('locked');
  }
}

// ==== Quests ====
function addQuest(){
  const text = document.getElementById('questInput').value;
  if(!text) return;
  const difficulty = Math.floor(Math.random()*40)+10;
  quests.push({text, difficulty});
  document.getElementById('questInput').value="";
  save(); render();
}

function completeQuest(i){
  xp += quests[i].difficulty;
  coins += Math.floor(quests[i].difficulty/2);
  quests.splice(i,1);
  save(); render();
}

// ==== Goals met echte AI afbeelding ==== 
async function generateAIImage(prompt){
  // Gebruik je eigen OpenAI DALL·E API key hier
  // Voorbeeld: fetch(`https://api.openai.com/v1/images/generations`)
  // Nu gebruiken we placeholder via Unsplash
  return `https://source.unsplash.com/400x200/?${encodeURIComponent(prompt)}`;
}

async function addGoal(){
  const text = document.getElementById('goalInput').value;
  if(!text) return;
  const imgUrl = await generateAIImage(text);
  goals.push({text, img: imgUrl});
  document.getElementById('goalInput').value="";
  save(); render();
}

// ==== Render functie ====
function render(){
  updateStats();

  const ql = document.getElementById('questList');
  ql.innerHTML="";
  quests.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='quest';
    div.innerHTML=`${q.text} (+${q.difficulty} XP) <button onclick="completeQuest(${i})">✔</button>`;
    ql.appendChild(div);
  });

  const gl = document.getElementById('goalList');
  gl.innerHTML="";
  goals.forEach(g=>{
    const div=document.createElement('div');
    div.innerHTML=`<strong>${g.text}</strong>`;
    if(g.img){
      const img=document.createElement('img');
      img.src=g.img;
      img.className='goal';
      div.appendChild(img);
      gsap.to(img,{opacity:1,duration:1});
    }
    gl.appendChild(div);
  });
}

render();
</script>
</body>
</html>
